name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render Free Tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows running manually from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HeartOut API
        run: |
          echo "Hitting Render health endpoint to keep server warm..."
          curl -f -m 10 https://heartout-kx89.onrender.com/api/health || echo "Ping failed, but server might still be waking up"
